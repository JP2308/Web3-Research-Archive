title: "Web3 Research Archive"
tagline: "Smart contract security and protocol economic risk analysis"
description: "Security research spanning smart contract exploits and DeFi protocol financial risk."
baseurl: "/Web3-Research-Archive"
url: "https://jp2308.github.io"

# Theme
remote_theme: pages-themes/midnight@v0.2.0
plugins:
  - jekyll-remote-theme

# Markdown and syntax highlighting
markdown: kramdown
highlighter: rouge

# Theme options
show_downloads: false

# Optional defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
